<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding RSVP Dashboard</title>

    <link rel="stylesheet" href="admin.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

    <header>
        <h1>Wedding RSVP Dashboard</h1>
        <p>Navaneethakrishnan ❤️ Pandeeswari</p>
    </header>

    <section class="cards">

        <div class="card">
            <h2 id="totalResponses">0</h2>
            <p>Total Responses</p>
        </div>

        <div class="card accepted">
            <h2 id="accepted">0</h2>
            <p>Accepted</p>
        </div>

        <div class="card declined">
            <h2 id="declined">0</h2>
            <p>Declined</p>
        </div>

        <div class="card guests">
            <h2 id="guestCount">0</h2>
            <p>Total Guests</p>
        </div>

    </section>

    <section class="chart">

        <canvas id="rsvpChart"></canvas>

    </section>

    <section class="search">

        <input
            type="text"
            id="searchBox"
            placeholder="Search guest..."
        >
        <p id="lastUpdated"></p>

        <button id="refreshBtn">
            Refresh
        </button>

        <button id="downloadBtn">
            Download CSV
        </button>

    </section>

    <section class="table-section">

        <table id="guestTable">

            <thead>

                <tr>
                    <th>Name</th>
                    <th>Attendance</th>
                    <th>Guests</th>
                    <th>Message</th>
                    <th>Time</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </section>

</div>

<script src="admin.js"></script>

<div id="loadingOverlay" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,.7);
justify-content:center;
align-items:center;
font-size:24px;
z-index:9999;">
Loading...
</div>

</body>
</html>
